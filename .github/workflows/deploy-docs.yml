# ==================================================
# GitHub Pages — MkDocs Material デプロイ
# ==================================================
# main ブランチへの push (docs/, mkdocs.yml 変更時) で自動デプロイ
# 手動実行も可能

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs & dependencies
        run: |
          pip install \
            mkdocs-material \
            pymdown-extensions

      - name: Build & Deploy
        run: mkdocs gh-deploy --force
