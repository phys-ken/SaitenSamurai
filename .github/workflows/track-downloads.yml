# ---------------------------------------------------------------
# track-downloads.yml
# リリースアセットのダウンロード数を毎日 23:55 JST に記録する
# 記録データは main ではなく stats-data ブランチに保存する
#
# 集計を停止する方法 → .github/download_stats/README.md を参照
# ---------------------------------------------------------------

name: Track Release Downloads

on:
  schedule:
    # 毎日 14:55 UTC = 23:55 JST
    - cron: "55 14 * * *"
  workflow_dispatch:          # 手動でも実行可能

permissions:
  contents: write             # CSV を commit & push するため

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load previous CSV from stats-data branch (if exists)
        run: |
          if git ls-remote --exit-code --heads origin stats-data >/dev/null 2>&1; then
            git fetch origin stats-data --depth=1
            mkdir -p .github/download_stats
            git show origin/stats-data:.github/download_stats/downloads.csv > .github/download_stats/downloads.csv || true
            echo "Loaded existing CSV from stats-data branch"
          else
            echo "stats-data branch not found; starting a new CSV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch download counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/track_downloads.py

      - name: Commit & push CSV to stats-data branch
        run: |
          TMP_CSV="$RUNNER_TEMP/downloads.csv"
          cp .github/download_stats/downloads.csv "$TMP_CSV"

          # main 側の変更を捨ててから stats-data へ切り替える
          git reset --hard

          if git ls-remote --exit-code --heads origin stats-data >/dev/null 2>&1; then
            git checkout -B stats-data origin/stats-data
          else
            git checkout --orphan stats-data
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p .github/download_stats
          cp "$TMP_CSV" .github/download_stats/downloads.csv

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/download_stats/downloads.csv

          # 差分がなければ何もしない
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "stats: update download counts [skip ci]"
          git push origin stats-data
