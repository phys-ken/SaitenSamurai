# ==================================================
# Test — pytest 自動実行
# ==================================================
# push (全ブランチ) で pytest を自動実行する。
# 手動実行 (workflow_dispatch) にも対応。

name: Test

on:
  push:
    branches-ignore:
      - stats-data
  workflow_dispatch:

jobs:
  pytest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -q --timeout=60 -p no:warnings
