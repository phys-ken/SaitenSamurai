# ==================================================
# Release — exe ビルド & GitHub Release 作成
# ==================================================
# v* タグ (例: v4.1) を push すると自動で:
#   1. Windows 上で exe をビルド
#   2. GitHub Release を作成
#   3. exe をリリースアセットとしてアップロード

name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install `
            "opencv-python-headless>=4.5.0" `
            "numpy>=1.20.0" `
            "pandas>=1.3.0" `
            "Pillow>=8.0.0" `
            "openpyxl>=3.0.0" `
            "scikit-learn>=1.0.0" `
            "PyMuPDF>=1.20.0" `
            "matplotlib>=3.4.0" `
            "reportlab>=3.6.0" `
            "pyinstaller>=6.0.0"

      - name: Build exe
        run: pyinstaller saitensamurai.spec --noconfirm --clean

      - name: Detect exe name
        id: exe-name
        run: |
          $exe = Get-ChildItem "dist/SaitenSamurai_v*.exe" | Select-Object -First 1
          if (!$exe) {
            Write-Error "SaitenSamurai_v*.exe not found in dist/"
            exit 1
          }
          $size = $exe.Length / 1MB
          Write-Host "$($exe.Name): $([math]::Round($size, 1)) MB"
          "EXE_NAME=$($exe.Name)" >> $env:GITHUB_OUTPUT
          "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "採点侍 ${{ github.ref_name }}"
          body: |
            ## 採点侍 ${{ github.ref_name }}

            ### ダウンロード

            下の **Assets** セクションから `${{ steps.exe-name.outputs.EXE_NAME }}` をダウンロードしてください。

            ### 動作環境

            | 項目 | 内容 |
            |---|---|
            | **対応 OS** | **Windows 11**（動作確認済み） |
            | **ファイル形式** | 単体 exe（インストール不要） |

            ### 使い方

            1. `${{ steps.exe-name.outputs.EXE_NAME }}` をダウンロード
            2. 任意のフォルダに配置
            3. ダブルクリックで起動

            > **初回起動時の注意**: Windows SmartScreen が警告を表示する場合があります。「詳細情報」→「実行」で起動できます。

            ### 免責事項

            本ソフトウェアは「現状有姿（AS IS）」で提供されます。採点結果や成績データの正確性について、開発者はいかなる保証も行いません。**成績処理に使用する場合は、必ずご自身の目で結果を確認してください。** 詳細は[免責事項ページ](https://phys-ken.github.io/SaitenSamurai/disclaimer/)をご確認ください。

            ---

            :book: [ドキュメント](https://phys-ken.github.io/SaitenSamurai/) | :beetle: [バグ報告](https://github.com/phys-ken/SaitenSamurai/issues)
          draft: false
          # タグ名にハイフンを含む場合(例: v4.6.0-beta.1)はPre-releaseとして公開する。
          # Pre-releaseは /releases/latest に含まれず、一般ユーザーの導線に影響しない
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/${{ steps.exe-name.outputs.EXE_NAME }}
